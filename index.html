<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Y2K To-Do x Notion (Token Only)</title>
    <style>
        :root {
            --main-pink: #f9dae4;
            --heart-accent: #fc9ab7;
            --check-pink: #fecbde;
            --highlight-bg: #fff8fb;
            --text-gray: #666666;
            --item-border: #eeeeee;
        }

        body {
            background-color: #ffffff;
            font-family: 'Pretendard', -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        /* 설정창 */
        .notion-config {
            width: 330px;
            background: #fdfdfd;
            border: 2px solid var(--main-pink);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            box-sizing: border-box;
            box-shadow: 4px 4px 0px var(--main-pink);
        }
        .notion-config h4 { margin: 0 0 10px 0; color: var(--heart-accent); font-size: 14px; }
        .notion-config input {
            width: 100%; height: 36px; margin-bottom: 8px;
            border: 1px solid var(--item-border); border-radius: 6px;
            padding: 0 10px; font-size: 12px; box-sizing: border-box; outline: none;
        }
        .notion-config button {
            width: 100%; background: var(--main-pink); border: none;
            color: white; padding: 10px; border-radius: 6px;
            cursor: pointer; font-weight: bold;
        }

        /* 위젯 디자인 */
        .widget-card {
            width: 330px; background-color: var(--main-pink);
            padding: 5px; border-radius: 12px;
            box-shadow: inset 2px 2px 0px #ffffff, inset -2.5px -2.5px 0px #d9b8c4;
        }
        .inner-box { background: #ffffff; border-radius: 8px; border: 1.5px solid var(--main-pink); overflow: hidden; }
        .header { padding: 8px 12px; background-color: var(--highlight-bg); border-bottom: 2px solid var(--main-pink); display: flex; justify-content: space-between; align-items: center; color: var(--main-pink); font-weight: bold; }
        .input-row { padding: 15px 12px; display: flex; gap: 8px; border-bottom: 1.5px dotted var(--main-pink); }
        #todoInput { flex: 1; height: 34px; border: 1px solid var(--item-border); border-radius: 4px; padding: 0 10px; outline: none; }
        .add-btn { width: 34px; height: 34px; background: var(--highlight-bg); border: 2.5px solid var(--main-pink); border-radius: 6px; cursor: pointer; }
        .list-container { padding: 12px; max-height: 320px; overflow-y: auto; }
        
        /* 투두 아이템 */
        .todo-card { display: flex; align-items: center; padding: 10px; border: 1px solid var(--item-border); border-radius: 6px; margin-bottom: 8px; }
        .todo-card.checked { background: #fafafa; opacity: 0.6; }
        .todo-card.checked .text { text-decoration: line-through; }
        .checkbox { width: 18px; height: 18px; border: 1.5px solid var(--check-pink); border-radius: 3px; margin-right: 10px; cursor: pointer; }
        .text { flex: 1; font-size: 14px; color: var(--text-gray); }
    </style>
</head>
<body>

    <div class="notion-config">
        <h4>🎀 Notion Login</h4>
        <input type="password" id="notionToken" placeholder="ntn_ 토큰을 입력하세요">
        <button onclick="startNotionSync()">목록 불러오기</button>
    </div>

    <div class="widget-card">
        <div class="inner-box">
            <div class="header">to do list</div>
            <div class="input-row">
                <input type="text" id="todoInput" placeholder="add a task...">
                <button class="add-btn" onclick="addTodo()">+</button>
            </div>
            <div class="list-container" id="todoList"></div>
        </div>
    </div>

    <script>
        const list = document.getElementById('todoList');
        const PROXY = "https://corsproxy.io/?";

        // 1. 노션 검색 API로 DB ID 찾아오기
        async function startNotionSync() {
            const token = document.getElementById('notionToken').value.trim();
            if(!token) return alert("토큰을 입력해주세요!");

            list.innerHTML = '<li>연결 중...</li>';

            try {
                // 노션 내의 모든 데이터베이스 검색
                const searchRes = await fetch(PROXY + encodeURIComponent("https://api.notion.com/v1/search"), {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Notion-Version': '2022-06-28',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        filter: { property: "object", value: "database" },
                        sort: { direction: "descending", timestamp: "last_edited_time" }
                    })
                });

                const searchData = await searchRes.json();
                
                if(!searchData.results || searchData.results.length === 0) {
                    alert("연결된 데이터베이스를 찾을 수 없습니다. 노션에서 '연결 추가'를 했는지 확인하세요!");
                    return;
                }

                // 가장 최근에 수정된 DB ID 선택
                const dbId = searchData.results[0].id;
                fetchTodos(token, dbId);

            } catch (e) {
                alert("통신 에러! 토큰을 확인하거나 잠시 후 시도하세요.");
            }
        }

        // 2. 실제 할 일 목록 가져오기
        async function fetchTodos(token, dbId) {
            try {
                const res = await fetch(PROXY + encodeURIComponent(`https://api.notion.com/v1/databases/${dbId}/query`), {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Notion-Version': '2022-06-28'
                    }
                });

                const data = await res.json();
                list.innerHTML = '';

                data.results.forEach(item => {
                    const props = item.properties;
                    let text = "내용 없음";
                    for (const key in props) {
                        if (props[key].type === "title") {
                            text = props[key].title[0]?.plain_text || "내용 없음";
                            break;
                        }
                    }
                    createTodoElement(text, false);
                });
                alert("✨ 연동 성공!");
            } catch (e) {
                alert("데이터를 가져오는 데 실패했습니다.");
            }
        }

        function createTodoElement(text, isChecked) {
            const div = document.createElement('div');
            div.className = `todo-card ${isChecked ? 'checked' : ''}`;
            div.innerHTML = `<div class="checkbox" onclick="this.parentElement.classList.toggle('checked')"></div><span class="text">${text}</span>`;
            list.appendChild(div);
        }

        function addTodo() {
            const input = document.getElementById('todoInput');
            if(!input.value) return;
            createTodoElement(input.value, false);
            input.value = '';
        }
    </script>
</body>
</html>
