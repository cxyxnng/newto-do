<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Y2K To-Do x Notion</title>
    <style>
        :root {
            --main-pink: #f9dae4;
            --heart-accent: #fc9ab7;
            --check-pink: #fecbde;
            --highlight-bg: #fff8fb;
            --text-gray: #666666;
            --item-border: #eeeeee;
        }

        body {
            background-color: #ffffff;
            font-family: 'Pretendard', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .widget-card {
            width: 330px;
            background-color: var(--main-pink);
            padding: 5px;
            border-radius: 12px;
            box-shadow: inset 2px 2px 0px #ffffff, inset -2.5px -2.5px 0px #d9b8c4;
        }

        .inner-box {
            background: #ffffff;
            border-radius: 8px;
            border: 1.5px solid var(--main-pink);
            overflow: hidden;
        }

        .header {
            padding: 8px 12px;
            background-color: var(--highlight-bg);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--main-pink);
            color: var(--heart-accent);
            font-weight: bold;
        }

        .sync-btn {
            background: var(--main-pink);
            border: none;
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 10px;
            cursor: pointer;
            font-weight: bold;
        }

        .input-row {
            padding: 15px 12px;
            display: flex;
            gap: 8px;
            border-bottom: 1.5px dotted var(--main-pink);
        }

        #todoInput {
            flex: 1;
            height: 34px;
            padding: 0 10px;
            border: 1px solid var(--item-border);
            border-radius: 4px;
            outline: none;
        }

        .add-btn {
            width: 34px;
            height: 34px;
            background: var(--highlight-bg);
            border: 2.5px solid var(--main-pink);
            border-radius: 6px;
            cursor: pointer;
            color: var(--heart-accent);
            font-weight: bold;
        }

        .list-container {
            padding: 12px;
            max-height: 350px;
            overflow-y: auto;
        }

        .todo-card {
            display: flex;
            align-items: center;
            padding: 10px;
            border: 1px solid var(--item-border);
            border-radius: 6px;
            margin-bottom: 8px;
            background: white;
        }

        .todo-card.checked { opacity: 0.5; background: #f9f9f9; }
        .todo-card.checked .text { text-decoration: line-through; }

        .checkbox {
            width: 18px;
            height: 18px;
            border: 1.5px solid var(--check-pink);
            border-radius: 3px;
            margin-right: 10px;
            cursor: pointer;
        }

        .text { flex: 1; font-size: 14px; color: var(--text-gray); }
    </style>
</head>
<body>

    <div class="widget-card">
        <div class="inner-box">
            <div class="header">
                <span>my to-do</span>
                <button class="sync-btn" onclick="autoSync()">노션 연동하기</button>
            </div>

            <div class="input-row">
                <input type="text" id="todoInput" placeholder="add a task...">
                <button class="add-btn" onclick="addTodo()">+</button>
            </div>

            <div class="list-container" id="todoList"></div>
        </div>
    </div>

    <script>
        const list = document.getElementById('todoList');
        const MY_TOKEN = "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";
        const PROXY = "https://api.allorigins.win/raw?url=";

        // 1. 노션 연동 시작 (토큰 입력 필요 없음!)
        async function autoSync() {
            list.innerHTML = '<li>연결 중...</li>';
            
            try {
                // 내 계정의 DB 검색
                const searchUrl = encodeURIComponent("https://api.notion.com/v1/search");
                const res = await fetch(PROXY + searchUrl, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${MY_TOKEN}`,
                        'Notion-Version': '2022-06-28',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        filter: { property: "object", value: "database" },
                        sort: { direction: "descending", timestamp: "last_edited_time" }
                    })
                });

                const searchData = await res.json();
                
                if(!searchData.results || searchData.results.length === 0) {
                    alert("연결된 노션 페이지를 찾을 수 없어요! '연결 추가'를 꼭 해주세요.");
                    return;
                }

                // 가장 최근 DB ID 가져오기
                const dbId = searchData.results[0].id;
                fetchData(dbId);

            } catch (e) {
                alert("통신 에러가 발생했습니다. 브라우저 설정을 확인해주세요!");
            }
        }

        // 2. 데이터 가져오기
        async function fetchData(dbId) {
            try {
                const queryUrl = encodeURIComponent(`https://api.notion.com/v1/databases/${dbId}/query`);
                const res = await fetch(PROXY + queryUrl, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${MY_TOKEN}`,
                        'Notion-Version': '2022-06-28'
                    }
                });

                const data = await res.json();
                list.innerHTML = '';

                data.results.forEach(item => {
                    const props = item.properties;
                    let title = "내용 없음";
                    for (const key in props) {
                        if (props[key].type === "title") {
                            title = props[key].title[0]?.plain_text || "내용 없음";
                            break;
                        }
                    }
                    createTodo(title, false);
                });
                alert("연동 성공! ✨");
            } catch (e) {
                alert("데이터를 가져오지 못했습니다.");
            }
        }

        function createTodo(text, isChecked) {
            const div = document.createElement('div');
            div.className = `todo-card ${isChecked ? 'checked' : ''}`;
            div.innerHTML = `
                <div class="checkbox" onclick="this.parentElement.classList.toggle('checked')"></div>
                <span class="text">${text}</span>
            `;
            list.appendChild(div);
        }

        function addTodo() {
            const input = document.getElementById('todoInput');
            if(!input.value) return;
            createTodo(input.value, false);
            input.value = '';
        }
    </script>
</body>
</html>
